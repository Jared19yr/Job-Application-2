      <hr>
          <h1>Welcome to the Job Application Portal</h1>
         <h3>Apply online, let us find the vacancy that fits your field of work, all you have to do is track your application</h3>

         <hr>

        

    <main>
        <div class="container">
    <h2>Job Application Form</h2>

    <form id="applicationForm">

        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="department">Department / Field of Work</label>
            <input type="text" id="department" required>
        </div>

        <div class="form-group">
            <label for="qualification">Select Qualification</label>
            <select id="qualification" required>
                <option value="">-- Select Qualification --</option>
                <option value="High School Diploma">High School Diploma</option>
                <option value="Associate Degree">Associate Degree</option>
                <option value="Bachelor's Degree">Bachelor's Degree</option>
                <option value="Master's Degree">Master's Degree</option>
                <option value="PhD">PhD</option>
                <option value="Professional Certification">Professional Certification</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cv">Upload CV (PDF, DOC, DOCX)</label>
            <input type="file" id="cv" accept=".pdf,.doc,.docx" required>
        </div>

        <button type="submit">Submit Application</button>

        <div class="success-message" id="successMessage"></div>

    </form>
</div>



<script>
document.getElementById("applicationForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const department = document.getElementById("department").value.trim();
    const qualification = document.getElementById("qualification").value;
    const cvFile = document.getElementById("cv").files[0];

    if (!fullName || !email || !department || !qualification || !cvFile) {
        alert("Please fill in all fields.");
        return;
    }

    const allowedTypes = ["application/pdf", 
                          "application/msword", 
                          "application/vnd.openxmlformats-officedocument.wordprocessingml.document"];

    if (!allowedTypes.includes(cvFile.type)) {
        alert("Invalid file type. Please upload PDF, DOC, or DOCX.");
        return;
    }

    document.getElementById("successMessage").textContent = 
        "Application submitted successfully! ✔️";

    document.getElementById("applicationForm").reset();
});
</script>





 </main>

 <script>
function toggleMenu() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("active");
}
</script>

<script>
document.addEventListener("click", function(event) {
    const sidebar = document.getElementById("sidebar");
    const toggle = document.querySelector(".menu-toggle");

    if (!sidebar.contains(event.target) && 
        !toggle.contains(event.target)) {
        sidebar.classList.remove("active");
    }
});
</script>


</body>
